apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: hello
          # Placeholder tag: the live tag is set in kustomization.yaml (images: newTag).
          # Argo CD Image Updater bumps kustomization.yaml; this line is never read by
          # kustomize for tag purposes — only the image *name* is matched. If you ever
          # `kubectl apply -f manifests.yaml` directly (bypassing kustomize), the pod
          # will ImagePullBackOff — by design, so the misuse is loud, not silent.
          image: registry.tadeo.ro/hello:overridden-by-kustomize
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hello
  namespace: hello
spec:
  selector:
    app: hello
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tadeo-ro-wildcard
  namespace: hello
spec:
  secretName: tadeo-ro-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.tadeo.ro"
  dnsNames:
    - "tadeo.ro"
    - "*.tadeo.ro"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hello
  namespace: hello
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hello.tadeo.ro`)
      kind: Rule
      services:
        - name: hello
          port: 80
  tls:
    secretName: tadeo-ro-wildcard-tls
