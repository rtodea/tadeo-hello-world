name: build
on:
  push:
    branches: [main]
  workflow_dispatch:   # let me trigger manually from the Actions tab

# Single in-flight build per ref; later commits cancel earlier in-flight runs
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Matches the runner scale set name in tadeo-microcosmos:apps/infrastructure/arc-runners-hello.yaml
    runs-on: tadeo-hello-world
    steps:
      - uses: actions/checkout@v4

      - name: short SHA + main both as tags
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "long=${GITHUB_SHA}"   >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: registry.tadeo.ro
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            registry.tadeo.ro/hello:${{ steps.meta.outputs.sha }}
            registry.tadeo.ro/hello:${{ steps.meta.outputs.long }}
            registry.tadeo.ro/hello:main
          cache-from: type=registry,ref=registry.tadeo.ro/hello:buildcache
          cache-to:   type=registry,ref=registry.tadeo.ro/hello:buildcache,mode=max
